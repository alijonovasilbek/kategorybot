services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kategorybot}
      POSTGRES_USER: ${POSTGRES_USER:-kategorybot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kategorybot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kategorybot} -d ${POSTGRES_DB:-kategorybot}"]
      interval: 5s
      timeout: 5s
      retries: 12

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PORT: 8000
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-kategorybot}:${POSTGRES_PASSWORD:-kategorybot}@db:5432/${POSTGRES_DB:-kategorybot}
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/uploads

volumes:
  postgres_data:
  uploads_data:
